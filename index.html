<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Coin Recharge Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #05070a; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        /* Glassmorphism Effect */
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* Coin Card Styling */
        .coin-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border: 2px solid #1e293b; position: relative; overflow: hidden; }
        .active-card { border-color: #fbbf24 !important; background: linear-gradient(145deg, #1e293b, #0f172a); transform: scale(1.05); box-shadow: 0 20px 25px -5px rgba(251, 191, 36, 0.15); }
        
        /* Logo Glow */
        .logo-glow { filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.4)); }
        
        /* Animations */
        .notification { transform: translateY(-120%); transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .notification.show { transform: translateY(20px); }
        
        .feed-item { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen pb-24">

    <div id="toast" class="notification fixed top-0 z-[100] w-[90%] max-w-sm glass p-4 rounded-2xl flex items-center gap-4 shadow-2xl">
        <div class="bg-green-500 w-10 h-10 rounded-full flex items-center justify-center shrink-0">
            <i class="fa-solid fa-check text-white"></i>
        </div>
        <div>
            <p class="font-extrabold text-sm text-green-400">Coins Verified & Sent</p>
            <p class="text-[10px] text-slate-400">Blockchain Hash: 0x82...f92a</p>
        </div>
    </div>

    <div class="w-full max-w-md mt-4">
        
        <div class="flex flex-col items-center mb-6">
            <div class="w-16 h-16 bg-slate-900 rounded-2xl border border-slate-700 flex items-center justify-center mb-2 shadow-xl">
                 <i class="fa-brands fa-tiktok text-3xl text-white logo-glow"></i>
            </div>
            <h1 class="text-sm font-black tracking-[0.3em] uppercase text-slate-400">Recharge Hub</h1>
        </div>

        <div class="glass rounded-[2.5rem] overflow-hidden shadow-2xl border-t border-white/10">
            
            <div class="p-8 pb-6 flex justify-between items-center bg-white/5">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <img id="pfp" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-12 h-12 rounded-xl bg-slate-800 p-0.5 border border-slate-700">
                        <div id="v-badge" class="hidden absolute -top-1 -right-1 bg-blue-500 w-5 h-5 rounded-full border-2 border-slate-900 flex items-center justify-center">
                            <i class="fa-solid fa-check text-[8px]"></i>
                        </div>
                    </div>
                    <div>
                        <h2 id="user-display" class="font-extrabold text-lg">Guest_User</h2>
                        <div class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                            <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Secure Server</span>
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Balance</p>
                    <p class="text-yellow-500 font-black text-sm">999,999 <i class="fa-solid fa-coins ml-0.5"></i></p>
                </div>
            </div>

            <div class="px-8 py-8">
                <div class="mb-8">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 block">Target Account</label>
                    <div class="relative">
                         <i class="fa-brands fa-at absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
                         <input type="text" id="target-user" placeholder="Enter Username" 
                            class="w-full bg-slate-950/80 border border-slate-800 rounded-2xl py-4 pl-12 pr-6 text-white focus:border-yellow-500 outline-none transition-all font-semibold placeholder:text-slate-700">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="coin-card bg-slate-900/40 rounded-3xl p-5 text-center" onclick="selectPkg(this, 70, 0.74)">
                        <div class="flex justify-center mb-3">
                            <div class="w-8 h-8 rounded-full bg-yellow-500/10 flex items-center justify-center border border-yellow-500/20">
                                <i class="fa-brands fa-tiktok text-yellow-500 text-xs"></i>
                            </div>
                        </div>
                        <div class="text-xl font-black mb-0.5">70</div>
                        <div class="text-slate-500 font-bold text-[10px]">$0.74</div>
                    </div>
                    <div class="coin-card bg-slate-900/40 rounded-3xl p-5 text-center" onclick="selectPkg(this, 350, 3.70)">
                        <div class="flex justify-center mb-3">
                            <div class="w-8 h-8 rounded-full bg-yellow-500/10 flex items-center justify-center border border-yellow-500/20">
                                <i class="fa-brands fa-tiktok text-yellow-500 text-xs"></i>
                            </div>
                        </div>
                        <div class="text-xl font-black mb-0.5">350</div>
                        <div class="text-slate-500 font-bold text-[10px]">$3.70</div>
                    </div>
                    <div class="coin-card bg-slate-900/40 rounded-3xl p-5 text-center" onclick="selectPkg(this, 700, 7.40)">
                        <div class="flex justify-center mb-3">
                            <div class="w-8 h-8 rounded-full bg-yellow-500/10 flex items-center justify-center border border-yellow-500/20">
                                <i class="fa-brands fa-tiktok text-yellow-500 text-xs"></i>
                            </div>
                        </div>
                        <div class="text-xl font-black mb-0.5">700</div>
                        <div class="text-slate-500 font-bold text-[10px]">$7.40</div>
                    </div>
                    <div class="coin-card bg-slate-900/40 rounded-3xl p-5 text-center" onclick="selectPkg(this, 1400, 14.80)">
                        <div class="flex justify-center mb-3">
                            <div class="w-8 h-8 rounded-full bg-yellow-500/10 flex items-center justify-center border border-yellow-500/20">
                                <i class="fa-brands fa-tiktok text-yellow-500 text-xs"></i>
                            </div>
                        </div>
                        <div class="text-xl font-black mb-0.5">1,400</div>
                        <div class="text-slate-500 font-bold text-[10px]">$14.80</div>
                    </div>
                </div>

                <button id="cta-btn" onclick="startFlow()" class="w-full mt-10 bg-gradient-to-r from-yellow-500 via-orange-500 to-yellow-600 py-5 rounded-2xl font-black text-slate-950 shadow-xl shadow-orange-500/20 active:scale-95 transition-all uppercase tracking-widest text-xs">
                    Get Coins Now
                </button>
            </div>
        </div>

        <div class="mt-8 px-4">
            <h3 class="text-[10px] font-black text-slate-600 uppercase tracking-widest mb-4 flex items-center gap-3">
                <span class="flex h-2 w-2 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                Global Live Recharge
            </h3>
            <div id="activity-feed" class="space-y-3"></div>
        </div>
    </div>

    <script>
        let selected = null;

        function selectPkg(el, amt, price) {
            document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('active-card'));
            el.classList.add('active-card');
            selected = { amt, price };
        }

        function startFlow() {
            const user = document.getElementById('target-user').value;
            const btn = document.getElementById('cta-btn');
            if(!user || !selected) return alert("Please select a package and enter a username.");

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-shield-check animate-pulse mr-2"></i> Verifying...`;

            setTimeout(() => {
                document.getElementById('user-display').innerText = user;
                document.getElementById('v-badge').classList.remove('hidden');
                document.getElementById('toast').classList.add('show');
                btn.innerHTML = `<i class="fa-solid fa-circle-check mr-2"></i> Coins Dispatched`;
                btn.style.background = "linear-gradient(to right, #10b981, #059669)";
                
                setTimeout(() => { document.getElementById('toast').classList.remove('show'); }, 4000);
            }, 2500);
        }

        const names = ["Jaxon_R", "Mila.official", "King_V", "Tox_ic", "GamerX", "User_771"];
        const amounts = [70, 350, 700, 1,400];

        function addFeedItem() {
            const feed = document.getElementById('activity-feed');
            const name = names[Math.floor(Math.random() * names.length)];
            const amt = amounts[Math.floor(Math.random() * amounts.length)];
            
            const item = document.createElement('div');
            item.className = "feed-item glass p-3.5 rounded-2xl flex justify-between items-center text-[11px]";
            item.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fa-brands fa-tiktok text-slate-500"></i>
                    <span class="font-bold text-slate-200">${name}</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-green-500 font-bold">+${amt}</span>
                    <span class="text-slate-600">3s ago</span>
                </div>
            `;

            feed.prepend(item);
            if(feed.children.length > 3) feed.lastChild.remove();
        }

        setInterval(addFeedItem, 5000);
        addFeedItem();
    </script>
</body>
</html>
